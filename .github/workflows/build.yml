name: Build and Release XanMod LTS Kernel

on:
  push:
    branches: [ "main", "nvidia-compat", "kernel-6.16", "amd-ryzen9-5900x" ]
  pull_request:
    branches: [ "main", "nvidia-compat", "kernel-6.16", "amd-ryzen9-5900x" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup system and dependencies
      run: |
        pacman -Syu --noconfirm
        pacman -S --noconfirm --needed base-devel git sudo bc cpio pahole python rust rust-bindgen rust-src libelf gettext
        echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
        useradd -m -s /bin/bash builder || true
        chown -R builder:builder .

    - name: Clean and build kernel
      run: |
        rm -rf src/ pkg/ *.pkg.tar*
        su - builder -c "
          cd $(pwd) &&
          export MAKEFLAGS='-j$(nproc)' &&
          makepkg -s --noconfirm --skippgpcheck
        "

    - name: List built packages
      run: |
        ls -la *.pkg.tar* 2>/dev/null || echo "No packages found"

    - name: Upload kernel package artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-xanmod-lts-packages
        path: ./*.pkg.tar*
        retention-days: 7

    - name: Create GitHub Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: ./*.pkg.tar*
        generate_release_notes: true
        draft: false
        prerelease: false